name: CI/CD Pipeline

# Étape 1 - Déclencheur : se déclenche à chaque push sur la branche main
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/frontend

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      # Étape 1 - Récupération du code
      - name: Checkout du code
        uses: actions/checkout@v4

      # Étape 2 - Configuration de Docker Buildx
      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Étape 2 - Connexion à Docker Hub
      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape 2.1 - Installer JDK et construire le JAR backend
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Build backend JAR
        working-directory: ./springboot/app
        shell: pwsh
        run: |
          .\mvnw.cmd -B clean package -DskipTests

      # Étape 2 - Build et push de l'image backend
      - name: Build et push backend
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      # Étape 2 - Build et push de l'image frontend
      - name: Build et push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Pull and tag images for docker-compose
        shell: pwsh
        run: |
          docker pull "${env:BACKEND_IMAGE}:latest"
          if ($LASTEXITCODE -ne 0) { Write-Host 'backend image pull failed, continuing' }
          docker tag "${env:BACKEND_IMAGE}:latest" nouran10/spring-boot-app
          docker pull "${env:FRONTEND_IMAGE}:latest"
          if ($LASTEXITCODE -ne 0) { Write-Host 'frontend image pull failed, continuing' }
          docker tag "${env:FRONTEND_IMAGE}:latest" nouran10/angular-app
      # Étape 3 - Test avec Docker Compose
      - name: Lancement de l'application
        shell: pwsh
        run: |
          docker compose up -d
          Start-Sleep -Seconds 15

      # Étape 3 - Vérification des conteneurs
      - name: Vérification des conteneurs
        shell: pwsh
        run: |
          docker compose ps

          $backendIds = docker compose ps -q spring-boot-app
          if ([string]::IsNullOrWhiteSpace($backendIds)) {
            docker compose logs spring-boot-app
            exit 1
          }

          $frontendIds = docker compose ps -q angular-app
          if ([string]::IsNullOrWhiteSpace($frontendIds)) {
            docker compose logs angular-app
            exit 1
          }

      # Étape 3 - Test de communication
      - name: Test de communication
        shell: pwsh
        run: |
          Start-Sleep -Seconds 5
          try {
            Invoke-WebRequest 'http://localhost:8081/health' -UseBasicParsing -ErrorAction Stop
          } catch {
            docker compose logs spring-boot-app
            exit 1
          }

          try {
            Invoke-WebRequest 'http://localhost:4200' -UseBasicParsing -ErrorAction Stop
          } catch {
            docker compose logs angular-app
            exit 1
          }

      # Nettoyage
      - name: Arrêt des conteneurs
        if: always()
        run: docker compose down -v
